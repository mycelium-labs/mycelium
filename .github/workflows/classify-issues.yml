name: Classify issues → HF predictions

# Runs after scrape-issues.yml succeeds (so freshly-scraped issues get
# classified within minutes) AND every 90 minutes on its own cron so the
# Tier-1-rate-limited LLM phase can chip away at the backlog continuously.
# Manually triggerable for backfills.
#
# The concurrency group below means cron fires that land during an active
# 90-min run just queue (with cancel-in-progress: false), giving back-to-
# back execution. Pipeline is idempotent — already-classified issues are
# skipped on every run.

on:
  workflow_run:
    workflows: ["Scrape GitHub issues → HF dataset"]
    types: [completed]
  schedule:
    # Every 90 minutes (UTC). Two crons interleaved to land at :00 and :30.
    # 16 fires per day total: 00:00, 01:30, 03:00, 04:30, ..., 22:30.
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:
    inputs:
      max_issues:
        description: "Cap total classifications this run (default 5000)."
        type: string
        default: "5000"
      limit:
        description: "Per-repo cap (smoke test). Leave empty for none."
        type: string
        default: ""
      repo:
        description: "Restrict to one repo (e.g. langchain-ai/langchain). Leave empty for all."
        type: string
        default: ""
      concurrency:
        description: "Concurrent in-flight LLM requests (default 3 for tier 1)."
        type: string
        default: "3"

concurrency:
  group: classify-issues
  cancel-in-progress: false

jobs:
  classify:
    # Only run after a *successful* scrape (skip if scrape failed). Manual
    # dispatches always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install huggingface_hub openai python-dotenv

      - name: Classify new issues
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MYCELIUM_HF_REPO: ${{ secrets.MYCELIUM_HF_REPO }}
        run: |
          set -euo pipefail
          # Defaults (used for cron + workflow_run triggers, where inputs.* are empty).
          MAX_ISSUES="${{ inputs.max_issues || '5000' }}"
          CONCURRENCY="${{ inputs.concurrency || '3' }}"
          ARGS=(--max-issues "$MAX_ISSUES" --concurrency "$CONCURRENCY")
          if [[ -n "${{ inputs.limit }}" ]]; then
            ARGS+=(--limit "${{ inputs.limit }}")
          fi
          if [[ -n "${{ inputs.repo }}" ]]; then
            ARGS+=(--repo "${{ inputs.repo }}")
          fi
          echo "=== classify run ${ARGS[*]} ==="
          python scripts/classify_corpus.py run "${ARGS[@]}"
