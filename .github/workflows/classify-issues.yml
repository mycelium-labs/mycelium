name: Classify issues → HF predictions

# Runs after scrape-issues.yml succeeds (so freshly-scraped issues get
# classified within minutes). Also runs on its own daily cron at 09:00 UTC
# so any backlog from rate-limited prior runs gets caught up. Manually
# triggerable for backfills.
#
# Pipeline is idempotent: re-running won't re-classify what's already in
# predictions/<repo>.jsonl on HF. The --max-issues cap keeps a single run
# under the 90-minute job timeout when there's a large backlog.

on:
  workflow_run:
    workflows: ["Scrape GitHub issues → HF dataset"]
    types: [completed]
  schedule:
    # Daily catch-up at 09:00 UTC (~2h after the scrape cron).
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      max_issues:
        description: "Cap total classifications this run (default 5000)."
        type: string
        default: "5000"
      limit:
        description: "Per-repo cap (smoke test). Leave empty for none."
        type: string
        default: ""
      repo:
        description: "Restrict to one repo (e.g. langchain-ai/langchain). Leave empty for all."
        type: string
        default: ""
      concurrency:
        description: "Concurrent in-flight LLM requests (default 3 for tier 1)."
        type: string
        default: "3"

concurrency:
  group: classify-issues
  cancel-in-progress: false

jobs:
  classify:
    # Only run after a *successful* scrape (skip if scrape failed). Manual
    # dispatches always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install huggingface_hub openai python-dotenv

      - name: Classify new issues
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MYCELIUM_HF_REPO: ${{ secrets.MYCELIUM_HF_REPO }}
        run: |
          set -euo pipefail
          # Defaults (used for cron + workflow_run triggers, where inputs.* are empty).
          MAX_ISSUES="${{ inputs.max_issues || '5000' }}"
          CONCURRENCY="${{ inputs.concurrency || '3' }}"
          ARGS=(--max-issues "$MAX_ISSUES" --concurrency "$CONCURRENCY")
          if [[ -n "${{ inputs.limit }}" ]]; then
            ARGS+=(--limit "${{ inputs.limit }}")
          fi
          if [[ -n "${{ inputs.repo }}" ]]; then
            ARGS+=(--repo "${{ inputs.repo }}")
          fi
          echo "=== classify run ${ARGS[*]} ==="
          python scripts/classify_corpus.py run "${ARGS[@]}"
