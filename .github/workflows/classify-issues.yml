name: Classify issues → HF predictions

# Default: Groq (Llama) — cheap and fast. Set GROQ_API_KEY. Optional ANTHROPIC_API_KEY
# + LLM_BACKEND=anthropic to use Claude instead. Pipeline is idempotent; checkpoints
# every 50 LLM successes on HF.

on:
  workflow_run:
    workflows: ["Scrape GitHub issues → HF dataset"]
    types: [completed]
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      max_issues:
        description: "Cap total classifications this run (default 5000)."
        type: string
        default: "5000"
      limit:
        description: "Per-repo cap (smoke test). Leave empty for none."
        type: string
        default: ""
      repo:
        description: "Restrict to one repo. Leave empty for all."
        type: string
        default: ""
      model:
        description: "Model id (default from script: llama-3.1-8b-instant on Groq)."
        type: string
        default: ""
      concurrency:
        description: "Concurrent LLM requests."
        type: string
        default: "16"
      llm_backend:
        description: "groq or anthropic (empty = auto: groq if GROQ_API_KEY set)."
        type: string
        default: ""

concurrency:
  group: classify-issues
  cancel-in-progress: false

jobs:
  classify:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install huggingface_hub openai anthropic python-dotenv

      - name: Classify new issues
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_BACKEND: ${{ inputs.llm_backend }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MYCELIUM_HF_REPO: ${{ secrets.MYCELIUM_HF_REPO }}
        run: |
          set -euo pipefail
          MAX_ISSUES="${{ inputs.max_issues || '5000' }}"
          CONCURRENCY="${{ inputs.concurrency || '16' }}"
          ARGS=(--max-issues "$MAX_ISSUES" --concurrency "$CONCURRENCY")
          if [[ -n "${{ inputs.model }}" ]]; then
            ARGS+=(--model "${{ inputs.model }}")
          fi
          if [[ -n "${{ inputs.limit }}" ]]; then
            ARGS+=(--limit "${{ inputs.limit }}")
          fi
          if [[ -n "${{ inputs.repo }}" ]]; then
            ARGS+=(--repo "${{ inputs.repo }}")
          fi
          echo "=== classify ${ARGS[*]} ==="
          python scripts/classify_corpus.py run "${ARGS[@]}"
