name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev
        working-directory: sdk

      - name: Lint
        run: uv run ruff check .
        working-directory: sdk

      - name: Format check
        run: uv run ruff format --check .
        working-directory: sdk

      - name: Type check
        run: uv run pyright
        working-directory: sdk

      - name: Tests
        run: uv run pytest tests/ --allow-no-tests
        working-directory: sdk
