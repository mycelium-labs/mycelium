name: AF-006 proof

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly regression against pinned proof submodule
    - cron: "0 12 * * 1"

# Bump when intentionally picking up new proof tests (update submodule + this ref).
env:
  AGENT_TEST_AF006_REF: b472e27f5ce967400436d710cf6e311e827a6bf6

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mycelium (with proof submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Required for private submodule in the same org (see proof/README.md).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify proof submodule ref
        run: |
          actual=$(git -C proof/agent-test-AF006 rev-parse HEAD)
          test "$actual" = "${AGENT_TEST_AF006_REF}" || {
            echo "proof/agent-test-AF006 is at $actual, expected ${AGENT_TEST_AF006_REF}"
            echo "Run: git submodule update --init && cd proof/agent-test-AF006 && git checkout ${AGENT_TEST_AF006_REF}"
            exit 1
          }

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install SDK (editable)
        run: uv sync --dev
        working-directory: sdk

      - name: Install proof test dependencies
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e "${{ github.workspace }}/sdk"
          uv pip install pytest pytest-asyncio hypothesis psutil
        working-directory: proof/agent-test-AF006

      - name: Run AF-006 proof suite
        env:
          MYCELIUM_SDK: ${{ github.workspace }}/sdk
        working-directory: proof/agent-test-AF006
        run: |
          export PYTHONPATH="${MYCELIUM_SDK}${PYTHONPATH:+:$PYTHONPATH}"
          .venv/bin/python -m pytest \
            tests/test_af006_*.py \
            tests/real_issues/ \
            -q --tb=short

      - name: Note on skipped tests
        if: always()
        run: |
          echo "HF corpus tests skip without .cache/predictions (expected on CI)."
          echo "framework_e2e/ is not run here; install langgraph etc. locally for full matrix."
