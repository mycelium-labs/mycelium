# Mycelium configuration (full reference template).
# Scaffold: mycelium init --full
# On-ramp (default): mycelium init | smaller multi-guard: mycelium init --minimal
#
# Required vs optional
#   Required for transition guards:  transition, action_ledger (+ tools entries you ledger)
#   Optional:  task_ledger, state_flush, audit_receipt, registry, runner,
#              history_guard, message_validator — delete unused sections
#
# Next steps
#   1. Allowlist first: rename tools: / tasks: stubs, then copy those exact
#      names into action_ledger.tools / task_ledger.tasks.
#      Defining a tool under tools: alone does NOT ledger it —
#      empty allowlist = no duplicate-side-effect protection.
#   2. Fill transition.agent_id / policy_version
#   3. load_config + @config.apply / @config.apply_task (or config.instrument)
#
# storage (ledgers): memory | file | redis | postgres
#   memory — process-local  |  file — needs path:
#   redis  — url: or url_env: (+ optional prefix, in_flight_ttl)
#   postgres — dsn: or dsn_env: (+ optional table)
# state_flush / audit_receipt: memory | file only
#
# side_effect_class (per ledgered tool): read | idempotent_mutate |
#   keyed_mutate | non_idempotent_mutate | irreversible
# spendability (optional override; defaults from side_effect_class):
#   multi_use | single_use | non_replayable
#   defaults: read/idempotent_mutate → multi_use;
#             keyed/non_idempotent_mutate → single_use;
#             irreversible → non_replayable
# provider_idempotency_key_param (optional, per tool): names the kwarg that
#   carries the provider idempotency key. When set, a
#   retry_only_with_same_provider_idempotency_key retry is ALLOWED only if it
#   reuses the same key, else HARD_BLOCK. Omit to keep the cooperative default.
#   e.g.  your_keyed_mutate_tool: {side_effect_class: keyed_mutate,
#                                  provider_idempotency_key_param: idempotency_key}
# In tool code, wrap the external call in `with side_effect():` so a failure
#   after the call is classified FAILED_AFTER_EFFECT / UNKNOWN (not retried),
#   not FAILED_BEFORE_EFFECT. Inside it call
#   `record_external_operation(provider_id_or_idempotency_key)` so an ambiguous
#   transition can later be reconciled against the provider.
# To reconcile automatically instead of hard-blocking, pass a read-only
#   Reconciler in code: `@ledger_sync(reconciler=...)` or
#   `ActionLedger(reconciler=...)`. It returns COMPLETED / NOT_EXECUTED /
#   UNKNOWN and is fail-closed (reconcilers can't be declared in YAML).

# ---------------------------------------------------------------------------
# transition
# ---------------------------------------------------------------------------
transition:
  agent_id: "<TODO: your agent id — used in transition keys and receipts>"
  policy_version: "<TODO: policy version string, e.g. 2026.07.1>"
  lease_ttl: 3600
  poll_interval: 0.05
  poll_timeout: 300
  # left = Mycelium field; right = kwarg name your tools receive (change/drop as needed)
  scope_from:
    thread_id: thread_id    # <TODO: conversation/thread kwarg>
    run_id: run_id          # <TODO: run/invocation kwarg>
    node: node              # <TODO: graph node/step kwarg>

# ---------------------------------------------------------------------------
# action_ledger  (tool-level claim/settle)
# ---------------------------------------------------------------------------
action_ledger:
  storage: file            # <TODO: memory | file | redis | postgres>
  path: ./mycelium-ledger.json
  # url_env: MYCELIUM_REDIS_URL          # redis
  # dsn_env: MYCELIUM_POSTGRES_DSN       # postgres
  # <TODO step 1: copy ledgered tool names from tools: keys below>
  tools: []

# ---------------------------------------------------------------------------
# task_ledger  (whole-task claim/settle; omit if unused)
# ---------------------------------------------------------------------------
task_ledger:
  storage: file            # <TODO: memory | file | redis | postgres>
  path: ./mycelium-task-ledger.json
  # url_env: MYCELIUM_REDIS_URL
  # dsn_env: MYCELIUM_POSTGRES_DSN
  # <TODO step 1: copy ledgered task names from tasks: keys below>
  tasks: []

# ---------------------------------------------------------------------------
# state_flush  (persist on abort; omit if unused)
# ---------------------------------------------------------------------------
state_flush:
  storage: file            # <TODO: memory | file>
  path: ./mycelium-state.json
  flush_on: [cancel, disconnect, error]   # subset of cancel | disconnect | error
  # flush_on_complete: true

# ---------------------------------------------------------------------------
# audit_receipt  (signed receipts; needs transition.agent_id; omit if unused)
# ---------------------------------------------------------------------------
audit_receipt:
  signing_key_env: MYCELIUM_SIGNING_KEY   # <TODO: set env, or use signing_key:>
  storage: file                           # <TODO: memory | file>
  path: ./mycelium-receipts.jsonl
  auto: true

# ---------------------------------------------------------------------------
# tools  (add real function names; then list ledgered ones in
#         action_ledger.tools — step 1). Keep empty until you add tools so
#         registry.auto does not allowlist placeholder names.
# ---------------------------------------------------------------------------
tools: {}
# One stub per side_effect_class (uncomment + rename):
#   your_read_tool:                 {side_effect_class: read}
#   your_idempotent_mutate_tool:    {side_effect_class: idempotent_mutate}
#   your_keyed_mutate_tool:         {side_effect_class: keyed_mutate}
#   your_non_idempotent_mutate_tool:{side_effect_class: non_idempotent_mutate}
#   your_irreversible_tool:         {side_effect_class: irreversible}
# Optional per tool: spendability: multi_use|single_use|non_replayable
#   (omit to use class default), protect: {entity_param, ttl}, bounded: {schema: {}}

# ---------------------------------------------------------------------------
# tasks  (omit if unused; then list ledgered names in task_ledger.tasks — step 1)
# ---------------------------------------------------------------------------
tasks: {}
#   your_task_function:
#     ledger: true
#     id_from: [your_business_key]

# ---------------------------------------------------------------------------
# registry / runner / history_guard / message_validator  (omit if unused)
# ---------------------------------------------------------------------------
registry:
  auto: true               # allowlist = keys under tools: (empty until you add tools)
  # or: auto: false + allowed: [tool_a, tool_b]

runner:
  max_llm_retries: 2
  max_tool_retries: 3

history_guard:
  max_tokens: 100000
  max_messages: 1000

message_validator:
  enabled: true
