# Mycelium configuration (full template).
# Scaffold: mycelium init --full | default: mycelium init | slim: mycelium init --minimal
#
# Required vs optional
#   Required for transition guards:  transition, action_ledger (+ tools entries you ledger)
#   Optional:  task_ledger, state_flush, audit_receipt, registry, runner,
#              history_guard, message_validator — delete unused sections
#
# Wire-up order
#   1. Fill transition.agent_id / policy_version
#   2. Rename tools: / tasks: stubs; put those names in action_ledger.tools /
#      task_ledger.tasks (empty allowlist = no ledger protection)
#   3. load_config + @config.apply / @config.apply_task (or config.instrument)
#
# storage (ledgers): memory | file | redis | postgres
#   memory — process-local  |  file — needs path:
#   redis  — url: or url_env: (+ optional prefix, in_flight_ttl)
#   postgres — dsn: or dsn_env: (+ optional table)
# state_flush / audit_receipt: memory | file only
#
# side_effect_class (per ledgered tool): read | idempotent_mutate |
#   keyed_mutate | non_idempotent_mutate | irreversible

# ---------------------------------------------------------------------------
# transition
# ---------------------------------------------------------------------------
transition:
  agent_id: "<TODO: your agent id — used in transition keys and receipts>"
  policy_version: "<TODO: policy version string, e.g. 2026.07.1>"
  lease_ttl: 3600
  poll_interval: 0.05
  poll_timeout: 300
  # left = Mycelium field; right = kwarg name your tools receive (change/drop as needed)
  scope_from:
    thread_id: thread_id    # <TODO: conversation/thread kwarg>
    run_id: run_id          # <TODO: run/invocation kwarg>
    node: node              # <TODO: graph node/step kwarg>

# ---------------------------------------------------------------------------
# action_ledger  (tool-level claim/settle)
# ---------------------------------------------------------------------------
action_ledger:
  storage: file            # <TODO: memory | file | redis | postgres>
  path: ./mycelium-ledger.json
  # url_env: MYCELIUM_REDIS_URL          # redis
  # dsn_env: MYCELIUM_POSTGRES_DSN       # postgres
  tools: []               # <TODO: names of ledgered tools — must match tools: keys>

# ---------------------------------------------------------------------------
# task_ledger  (whole-task claim/settle; omit if unused)
# ---------------------------------------------------------------------------
task_ledger:
  storage: file            # <TODO: memory | file | redis | postgres>
  path: ./mycelium-task-ledger.json
  # url_env: MYCELIUM_REDIS_URL
  # dsn_env: MYCELIUM_POSTGRES_DSN
  tasks: []               # <TODO: names of ledgered tasks — must match tasks: keys>

# ---------------------------------------------------------------------------
# state_flush  (persist on abort; omit if unused)
# ---------------------------------------------------------------------------
state_flush:
  storage: file            # <TODO: memory | file>
  path: ./mycelium-state.json
  flush_on: [cancel, disconnect, error]   # subset of cancel | disconnect | error
  # flush_on_complete: true

# ---------------------------------------------------------------------------
# audit_receipt  (signed receipts; needs transition.agent_id; omit if unused)
# ---------------------------------------------------------------------------
audit_receipt:
  signing_key_env: MYCELIUM_SIGNING_KEY   # <TODO: set env, or use signing_key:>
  storage: file                           # <TODO: memory | file>
  path: ./mycelium-receipts.jsonl
  auto: true

# ---------------------------------------------------------------------------
# tools  (rename stubs; delete unused; ledgered names → action_ledger.tools)
# ---------------------------------------------------------------------------
tools:
  "<TODO: your_read_tool>":
    side_effect_class: read
    # protect: {entity_param: "<id_param>", ttl: 60}
    # bounded: {schema: {}}

  "<TODO: your_idempotent_mutate_tool>":
    side_effect_class: idempotent_mutate

  "<TODO: your_keyed_mutate_tool>":
    side_effect_class: keyed_mutate

  "<TODO: your_non_idempotent_mutate_tool>":
    side_effect_class: non_idempotent_mutate

  "<TODO: your_irreversible_tool>":
    side_effect_class: irreversible

# ---------------------------------------------------------------------------
# tasks  (omit if unused; ledgered names → task_ledger.tasks)
# ---------------------------------------------------------------------------
tasks:
  "<TODO: your_task_function>":
    ledger: true
    id_from:
      - "<TODO: business key param>"

# ---------------------------------------------------------------------------
# registry / runner / history_guard / message_validator  (omit if unused)
# ---------------------------------------------------------------------------
registry:
  auto: true               # or false + allowed: [tool_a, tool_b]

runner:
  max_llm_retries: 2
  max_tool_retries: 3

history_guard:
  max_tokens: 100000
  max_messages: 1000

message_validator:
  enabled: true
