# Mycelium configuration (full template).
#
# Scaffolded with:  mycelium init --full
# Default quickstart: mycelium init
# Minimal variant:    mycelium init --minimal
#
# Next steps:
#   1. Edit tool/task names to match your Python functions.
#   2. In code:
#        from mycelium import load_config
#        config = load_config("mycelium.yaml")
#        tools = config.instrument(my_tools)
#        with config.run(thread_id):
#            messages = config.prepare_messages(messages)

# ---------------------------------------------------------------------------
# transition  (v1.3 — rich transition keys)
# ---------------------------------------------------------------------------
transition:
  agent_id: payment-agent
  policy_version: "2026.07.1"
  lease_ttl: 3600          # seconds before stale in-flight can be reclaimed
  poll_interval: 0.05       # seconds between read-only in-flight ledger checks
  poll_timeout: 300         # max seconds to poll a read-only in-flight transition
  scope_from:
    thread_id: thread_id
    run_id: run_id
    node: node

# ---------------------------------------------------------------------------
# action_ledger  (tool-level idempotency)
# ---------------------------------------------------------------------------
# storage: memory | file | redis | postgres
action_ledger:
  storage: file
  path: ./mycelium-ledger.json
  # Redis (multi-worker, atomic claim via SET NX):
  # storage: redis
  # url_env: MYCELIUM_REDIS_URL
  # prefix: mycelium:action:
  # in_flight_ttl: 3600
  # Postgres (audit/compliance, INSERT ... ON CONFLICT):
  # storage: postgres
  # dsn_env: MYCELIUM_POSTGRES_DSN
  # table: mycelium_action_ledger
  tools:
    - send_payment
    - delete_file

# ---------------------------------------------------------------------------
# task_ledger  (task-level idempotency)
# ---------------------------------------------------------------------------
task_ledger:
  storage: file
  path: ./mycelium-task-ledger.json
  tasks:
    - process_invoice

# ---------------------------------------------------------------------------
# state_flush  (cancel/disconnect safety)
# ---------------------------------------------------------------------------
state_flush:
  storage: file
  path: ./mycelium-state.json
  flush_on:
    - cancel
    - disconnect
    - error

# ---------------------------------------------------------------------------
# audit_receipt  (signed receipts; agent_id lives under transition)
# ---------------------------------------------------------------------------
audit_receipt:
  signing_key_env: MYCELIUM_SIGNING_KEY
  storage: file
  path: ./mycelium-receipts.jsonl
  auto: true

# ---------------------------------------------------------------------------
# tools  (per-tool protect, bounded; ledger via action_ledger above)
# ---------------------------------------------------------------------------
tools:
  fetch_customer:
    side_effect_class: read_only
    protect:
      entity_param: customer_id
      ttl: 60
    bounded:
      schema:
        customer_id:
          type: string
          required: true
          pattern: "^c\\d+$"
      output_schema:
        customer_id:
          type: string
          required: true
        name:
          type: string
          required: true

  send_payment:
    side_effect_class: payment
    retry_permission: manual_reconciliation_required
    side_effect_boundary: not_crossed
    bounded:
      schema:
        amount:
          type: number
          required: true
        recipient:
          type: string
          required: true

  delete_file:
    side_effect_class: non_idempotent_write
    bounded:
      schema:
        path:
          type: string
          required: true
      allowed_paths:
        - /workspace/src/
      path_param: path

  search_docs:
    side_effect_class: read_only
    bounded:
      schema:
        query:
          type: string
          required: true

# ---------------------------------------------------------------------------
# tasks
# ---------------------------------------------------------------------------
tasks:
  process_invoice:
    ledger: true
    id_from:
      - invoice_id

# ---------------------------------------------------------------------------
# registry
# ---------------------------------------------------------------------------
registry:
  auto: true

# ---------------------------------------------------------------------------
# runner
# ---------------------------------------------------------------------------
runner:
  max_llm_retries: 2
  max_tool_retries: 3

# ---------------------------------------------------------------------------
# history_guard
# ---------------------------------------------------------------------------
history_guard:
  max_tokens: 100000
  max_messages: 1000

# ---------------------------------------------------------------------------
# message_validator
# ---------------------------------------------------------------------------
message_validator:
  enabled: true
