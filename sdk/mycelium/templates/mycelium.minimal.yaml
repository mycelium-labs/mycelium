# Mycelium configuration (minimal).
#
# Scaffolded with:  mycelium init --minimal

action_ledger:
  storage: file
  path: ./mycelium-ledger.json
  tools:
    - delete_file

task_ledger:
  storage: file
  path: ./mycelium-task-ledger.json
  tasks:
    - process_invoice

state_flush:
  storage: file
  path: ./mycelium-state.json

audit_receipt:
  agent_id: demo-agent
  signing_key_env: MYCELIUM_SIGNING_KEY
  storage: file
  path: ./mycelium-receipts.jsonl

tools:
  fetch_customer:
    protect:
      entity_param: customer_id
      ttl: 60
    bounded:
      schema:
        customer_id:
          type: string
          required: true
          pattern: "^c\\d+$"
      output_schema:
        customer_id:
          type: string
          required: true
        name:
          type: string
          required: true

  search_docs:
    bounded:
      schema:
        query:
          type: string
          required: true

  delete_file:
    bounded:
      schema:
        path:
          type: string
          required: true
      allowed_paths:
        - /workspace/src/
      path_param: path

tasks:
  process_invoice:
    ledger: true
    id_from:
      - invoice_id

registry:
  auto: true

runner:
  max_llm_retries: 2
  max_tool_retries: 3

history_guard:
  max_tokens: 100000
  max_messages: 1000

message_validator:
  enabled: true
