# Mycelium on-ramp: stop duplicate tool execution on LangGraph retry.
#
# Scaffolded with:  mycelium init   (default — start here)
# Full reference:   mycelium init --full
#
# Real bug: langgraph#7417: long tool calls redispatched while still running.
#
# Next:
#   1. Fill every <TODO: …> below; rename subagent_task to match your tool.
#   2. Install `mycelium-runtime[langgraph]`; ToolRuntime IDs are propagated.
#   3. In code:
#        from mycelium import load_config
#        config = load_config("mycelium.yaml")
#
#        @config.apply
#        def subagent_task(task: str, duration_seconds: int) -> dict:
#            with side_effect():                 # marks the point of no return
#                run = run_slow_subagent(task)
#                record_external_operation(run.id)  # provider handle for reconcile
#            return run

integrations:
  langgraph:
    enabled: true

transition:
  agent_id: "<TODO: fill with your agent id — used in transition keys and receipts>"
  policy_version: "<TODO: fill with your policy version string, e.g. 2026.07.1>"

action_ledger:
  storage: file
  path: ./mycelium-ledger.json
  tools:
    - subagent_task

tools:
  subagent_task:
    side_effect_class: non_idempotent_mutate
