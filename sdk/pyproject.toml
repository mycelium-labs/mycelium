[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mycelium-sdk"
version = "0.1.0"
description = "Mycelium SDK — runtime protection for AI agents"
requires-python = ">=3.12"

[tool.hatch.build.targets.wheel]
packages = ["mycelium"]

[dependency-groups]
dev = [
    "pyright",
    "ruff",
    "pytest",
    "pytest-asyncio",
    "pre-commit",
]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
