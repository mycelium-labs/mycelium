# Mycelium configuration template.
#
# Minimum integration (3 steps):
#   1. Copy to mycelium.yaml and edit the global sections below.
#   2. List your tool/task function names under tools/tasks (or use
#      action_ledger.tools / task_ledger.tasks to auto-apply ledgers).
#   3. In code:
#        config = load_config("mycelium.yaml")
#        tools = config.instrument(my_tools)
#        with config.run(thread_id):
#            messages = config.prepare_messages(messages)
#            ...
#
# Separate sections per failure mode — globals inherit into per-tool `ledger: true`.

# ---------------------------------------------------------------------------
# action_ledger  (AF-002 — tool-level idempotency)
# ---------------------------------------------------------------------------
# storage: memory | file | redis | postgres
action_ledger:
  storage: file
  path: ./mycelium-ledger.json
  # Redis (multi-worker, atomic claim via SET + Lua):
  # storage: redis
  # url_env: MYCELIUM_REDIS_URL
  # prefix: mycelium:action:
  # in_flight_ttl: 3600
  # Postgres (audit/compliance, INSERT ... ON CONFLICT):
  # storage: postgres
  # dsn_env: MYCELIUM_POSTGRES_DSN
  # table: mycelium_action_ledger
  # Auto-apply ledger to side-effect tools without repeating storage config:
  tools:
    - send_payment
    - delete_file

# ---------------------------------------------------------------------------
# task_ledger  (AF-002 — task-level idempotency)
# ---------------------------------------------------------------------------
task_ledger:
  storage: file
  path: ./mycelium-task-ledger.json
  tasks:
    - process_invoice

# ---------------------------------------------------------------------------
# state_flush  (AF-002 — cancel/disconnect safety)
# ---------------------------------------------------------------------------
state_flush:
  storage: file
  path: ./mycelium-state.json
  flush_on:
    - cancel
    - disconnect
    - error

# ---------------------------------------------------------------------------
# audit_receipt  (AF-002 — signed receipts)
# ---------------------------------------------------------------------------
# When present, all ledgered tools/tasks get receipts unless opted out with
# `audit_receipt: false`.
audit_receipt:
  agent_id: payment-agent
  signing_key_env: MYCELIUM_SIGNING_KEY
  storage: file
  path: ./mycelium-receipts.jsonl
  auto: true

# ---------------------------------------------------------------------------
# tools  (AF-004 + AF-006 per-tool; AF-002 via action_ledger above)
# ---------------------------------------------------------------------------
tools:
  fetch_customer:
    protect:
      entity_param: customer_id
      ttl: 60
    bounded:
      schema:
        customer_id:
          type: string
          required: true
          pattern: "^c\\d+$"
      output_schema:
        customer_id:
          type: string
          required: true
        name:
          type: string
          required: true

  send_payment:
    # Inherits file ledger + audit receipt from global sections.
    bounded:
      schema:
        amount:
          type: number
          required: true
        recipient:
          type: string
          required: true

  delete_file:
    bounded:
      schema:
        path:
          type: string
          required: true
      allowed_paths:
        - /workspace/src/
      path_param: path

  search_docs:
    bounded:
      schema:
        query:
          type: string
          required: true

# ---------------------------------------------------------------------------
# tasks
# ---------------------------------------------------------------------------
tasks:
  process_invoice:
    ledger: true
    id_from:
      - invoice_id

# ---------------------------------------------------------------------------
# registry  (AF-004)
# ---------------------------------------------------------------------------
registry:
  auto: true

# ---------------------------------------------------------------------------
# runner  (AF-004)
# ---------------------------------------------------------------------------
runner:
  max_llm_retries: 2
  max_tool_retries: 3

# ---------------------------------------------------------------------------
# history_guard  (AF-006)
# ---------------------------------------------------------------------------
history_guard:
  max_tokens: 100000
  max_messages: 1000

# ---------------------------------------------------------------------------
# message_validator  (AF-006)
# ---------------------------------------------------------------------------
message_validator:
  enabled: true
